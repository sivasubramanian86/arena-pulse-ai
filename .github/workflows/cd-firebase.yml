name: CD — Deploy to Firebase Hosting

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/cd-firebase.yml'
  workflow_dispatch:
    inputs:
      backend_url:
        description: 'Cloud Run backend URL override'
        required: false
        default: ''

env:
  FIREBASE_PROJECT: genai-apac-2026-491004
  HOSTING_SITE: arena-pulse-ai
  NODE_VERSION: '20'

jobs:
  deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write    # Required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build Next.js static export
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_BACKEND_URL: ${{ inputs.backend_url || secrets.NEXT_PUBLIC_BACKEND_URL }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ env.FIREBASE_PROJECT }}
          target: ${{ env.HOSTING_SITE }}
          channelId: live

      - name: Post deployment summary
        run: |
          echo "### Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Site:** https://${{ env.HOSTING_SITE }}.web.app" >> $GITHUB_STEP_SUMMARY
          echo "- **Project:** ${{ env.FIREBASE_PROJECT }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
