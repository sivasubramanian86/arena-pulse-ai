name: Security Scan - Gitleaks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  gitleaks:
    name: Security Scans
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit

      - name: Run backend dependency audit (fail on high/critical)
        working-directory: backend
        run: |
          python -m pip_audit --format=json --progress-spinner=off > audit_backend.json || true
          python ../scripts/check_pip_audit.py

      - name: Run frontend dependency audit
        run: npm ci --legacy-peer-deps && npm audit --audit-level=high
        working-directory: frontend
